<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 155" width="900" height="155">
<defs>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .t  { font-family: "Courier New", Courier, monospace; }
    .title {
      animation: flicker 6s ease-in-out infinite;
    }
    .cursor { animation: blink 1.1s step-end infinite; }
    .sub    { animation: fadein 2s ease-out 0.4s both; }
    .top    { animation: fadein 2s ease-out 0s   both; }
    .bot    { animation: fadein 2s ease-out 0.8s both; }
    @keyframes flicker {
      0%,18%,20%,22%,25%,53%,55%,100% { filter:url(#glow); opacity:1;   }
      19%,21%,54%                      { filter:none;        opacity:0.82; }
    }
    @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  </style>
</defs>

<!-- background -->
<rect width="900" height="155" fill="#0d1117"/>

<!-- subtle horizontal scanlines -->
<rect x="0" y="0"   width="900" height="1" fill="#39ff14" opacity="0.03"/>
<rect x="0" y="52"  width="900" height="1" fill="#39ff14" opacity="0.04"/>
<rect x="0" y="104" width="900" height="1" fill="#39ff14" opacity="0.04"/>
<rect x="0" y="154" width="900" height="1" fill="#39ff14" opacity="0.03"/>

<!-- corner brackets -->
<polyline points="16,38  16,14  40,14"  fill="none" stroke="#39ff14" stroke-width="1.8" opacity="0.7"/>
<polyline points="884,38 884,14 860,14" fill="none" stroke="#39ff14" stroke-width="1.8" opacity="0.7"/>
<polyline points="16,117  16,141  40,141"  fill="none" stroke="#39ff14" stroke-width="1.8" opacity="0.7"/>
<polyline points="884,117 884,141 860,141" fill="none" stroke="#39ff14" stroke-width="1.8" opacity="0.7"/>

<!-- session label -->
<text x="450" y="32" text-anchor="middle" font-size="11" fill="#39ff14" opacity="0.55" class="t top">
  &#x27E6; SESSION INIT  &#xB7;  ShivamGawade-XS@github  &#xB7;  ACTIVE &#x27E7;
</text>

<!-- top rule -->
<rect x="44" y="42" width="812" height="0.8" fill="#39ff14" opacity="0.28"/>

<!-- main title -->
<text x="450" y="98" text-anchor="middle" font-size="50" font-weight="bold"
      fill="#39ff14" letter-spacing="5" class="t title">SHIVAM GAWADE</text>

<!-- bottom rule -->
<rect x="44" y="112" width="812" height="0.8" fill="#39ff14" opacity="0.28"/>

<!-- subtitle -->
<text x="450" y="129" text-anchor="middle" font-size="13" fill="#8b949e"
      letter-spacing="1" class="t sub">
  Electronics &amp; CS  &#xB7;  Security Researcher  &#xB7;  AI Builder  &#xB7;  Community Lead
</text>

<!-- terminal prompt -->
<text x="450" y="147" text-anchor="middle" font-size="12" fill="#39ff14"
      opacity="0.55" class="t bot">
  shivam@github:~ $&#160;<tspan class="cursor">&#x258C;</tspan>
</text>
</svg>